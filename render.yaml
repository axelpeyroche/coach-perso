services:
  - type: web
    name: coach-perso-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: web
    name: coach-perso-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
