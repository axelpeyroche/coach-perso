services:
  - type: web
    name: coach-perso-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: coach-perso-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        value: "BFRwG5AkqambpLWmQHJa0-6IGiNixgTD4QfmepqWLP6_Yv4FRxntYiMjBFZRQF1LpKGxD_JyUMjPnklLBcqiqrU"
